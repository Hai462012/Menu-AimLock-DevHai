<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>DevHai System</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  font-family: monospace;
  color: #00ffcc;
  text-align: center;
}

.box { margin-top: 80px; }
.hidden { display: none; }

/* INPUT + BUTTON */
input {
  padding: 10px;
  width: 220px;
  background: black;
  border: 1px solid #00ffcc;
  color: #00ffcc;
}

button {
  padding: 10px 20px;
  margin: 5px;
  background: transparent;
  border: 1px solid #00ffcc;
  color: #00ffcc;
  cursor: pointer;
}

button:hover {
  background: #00ffcc;
  color: black;
}

/* MENU */
.menu-btn {
  display: block;
  width: 220px;
  margin: 10px auto;
  padding: 10px;
  border: 1px solid #00ffcc;
  cursor: pointer;
}

.menu-btn:hover {
  background: #00ffcc;
  color: black;
}

/* STATUS BOX */
#statusBox {
  margin-top: 20px;
  min-height: 30px;
}

/* PROGRESS BAR */
.progress {
  width: 220px;
  height: 10px;
  border: 1px solid #00ffcc;
  margin: 10px auto;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #00ffcc;
}

/* BLINK TEXT */
.blink {
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>🔐 LOGIN</h2>
  <input id="key" placeholder="Nhập key"><br><br>
  <button onclick="login()">Đăng nhập</button>
</div>

<!-- MENU -->
<div class="box hidden" id="menu">
  <h2>⚡ DEVHAI PANEL</h2>

  <div class="menu-btn" onclick="runTool('AIMLOCK')">AIMLOCK</div>
  <div class="menu-btn" onclick="runTool('ESP')">ESP</div>
  <div class="menu-btn" onclick="runTool('NO RECOIL')">NO RECOIL</div>
  <div class="menu-btn" onclick="runTool('HEADSHOT')">HEADSHOT</div>

  <div id="statusBox"></div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</div>

<script>
// KEY DEMO
let key = "Vip000";

// LOGIN
function login() {
  let input = document.getElementById("key").value;
  if (input === key) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("menu").classList.remove("hidden");
  } else {
    alert("Sai key!");
  }
}

// RUN TOOL FAKE
function runTool(name) {
  let status = document.getElementById("statusBox");
  let bar = document.getElementById("progressBar");

  let steps = [
    "🔍 Scanning memory...",
    "📡 Connecting server...",
    "⚙️ Injecting data...",
    "🚀 Activating..."
  ];

  let i = 0;
  let progress = 0;

  status.innerHTML = "<span class='blink'>⏳ Starting " + name + "...</span>";
  bar.style.width = "0%";

  let interval = setInterval(() => {
    if (i < steps.length) {
      status.innerText = steps[i];
      i++;
    }

    progress += 10;
    bar.style.width = progress + "%";

    if (progress >= 100) {
      clearInterval(interval);
      status.innerHTML = "✅ " + name + " DONE!";
    }
  }, 300);
}
</script>

</body>
</html>
